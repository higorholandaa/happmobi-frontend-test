<div class="login-wrapper">
  <div class="login-card">

    <div class="logo-area">
      <div class="logo-shield">
        <img [src]="logoSrc" alt="Guardians logo" class="logo-img" />
      </div>
      <h1 class="brand-name">GUARDIANS</h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

      <mat-form-field appearance="outline" class="full-width">
        <input matInput type="email" formControlName="email" placeholder="email@exemplo.com" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <input matInput type="password" formControlName="password" placeholder="Senha" />
      </mat-form-field>

      <p *ngIf="loginError" class="error-msg">Usuário ou senha inválidos.</p>

      <button mat-flat-button type="submit" class="btn-enter" [disabled]="form.invalid">
        ENTRAR
      </button>

    </form>

    <a href="#" class="forgot-link">Esqueci minha senha</a>

  </div>

  <p class="register-text">
    Ainda não tem cadastro? <a href="#" class="register-link">Criar conta</a>
  </p>

</div>
